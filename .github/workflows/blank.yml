name: Build Tab A9+ Custom Kernel (KSU)
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: 🛠️ Prepare Environment
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev libelf-dev clang llvm lld gcc-aarch64-linux-gnu tar zip wget python3 cpio xz-utils ccache curl dos2unix
          
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4

      - name: 🗄️ Restore Compiler Cache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ksu-ccache-${{ github.run_id }}
          restore-keys: |
            ksu-ccache-
 
      - name: 📥 Integrate KernelSU-Next
        run: |
          # Just run the magic line directly!
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -
     
      - name: 🩹 Apply Deep Source Code Fixes
        run: |
          # 1. FIX PERMISSIONS & LINE ENDINGS
          chmod -R +x scripts/
          find . -type f -name "*.sh" -exec chmod +x {} +
          find . -type f -name "Kconfig*" -exec dos2unix {} +

          # 2. FIX DEPRECATED PROTOTYPES (The 'void' errors)
          sed -i 's/static int get_boot_mode()/static int get_boot_mode(void)/g' drivers/power/supply/wt_charger/wt_chg.c || true
          sed -i 's/static struct icnss_priv \*icnss_get_plat_priv()/static struct icnss_priv \*icnss_get_plat_priv(void)/g' drivers/soc/qcom/icnss2/main.c || true
          
          # 3. FIX FS/EXEC.C (Clean injection)
          sed -i '/ksu_handle_execveat/d' fs/exec.c
          sed -i '/static int do_execveat_common(int fd, struct filename \*filename,/,/{/ s/{/{\n\tksu_handle_execveat(\&fd, \&filename, \&argv, \&envp, \&flags);\n\tksu_handle_execveat_sucompat(\&fd, \&filename, \&argv, \&envp, \&flags);/' fs/exec.c

          # 4. FIX IMPLICIT DECLARATIONS
          for file in fs/open.c fs/read_write.c fs/stat.c fs/exec.c; do
            sed -i '/ksu.h/d' "$file" 
            sed -i '1i #include <kernelsu/ksu.h>' "$file"
          done

          # 5. USB HEADER FIX (Native approach)
          # Inject the missing interrupt header, but do NOT move files. The compiler will handle paths natively.
          find drivers/usb/typec -name "tcpci.h" -exec sed -i '1i #include <linux/interrupt.h>' {} + || true

          # 6. SAMSUNG & TECHPACK TYPOS
          find techpack/display -name "*.c" -exec sed -i 's/static inline _/static inline u32 _/g' {} +
          sed -i 's/static md_align_offset/static int md_align_offset/g' drivers/soc/qcom/minidump_log.c || true
          
          # 7. ARCHITECTURE & ZRAM FIXES
          sed -i '/extern unsigned long vdso_offset_/d' arch/arm64/include/asm/vdso.h || true
          sed -i '/#define TRACE_INCLUDE_PATH/c\#define TRACE_INCLUDE_PATH ../../kernel/sched/walt' kernel/sched/walt/trace.h || true
          sed -i 's|register unsigned long current_stack_pointer asm ("sp");|#define current_stack_pointer ({ unsigned long sp; asm("mov %0, sp" : "=r"(sp)); sp; })|g' arch/arm64/include/asm/stack_pointer.h || true
          
      - name: 8. KERNELSU COMPATIBILITY & SECCOMP FIX
        run: |
          mkdir -p drivers/kernelsu/kernel
          cp drivers/kernelsu/ksu.h drivers/kernelsu/kernel/ksu.h || true
          
          # 🛑 LEGACY 5.4 BACKPORT FIXES (Global TWA_RESUME, pgtable, strncpy, and copy_user)
          sed -i 's/TWA_RESUME/true/g' drivers/kernelsu/*.c || true
          sed -i '1i #include <linux/sched/task.h>' drivers/kernelsu/allowlist.c || true
          sed -i '1i #include <linux/sched/task.h>' drivers/kernelsu/setuid_hook.c || true
          sed -i 's/#include <linux\/pgtable.h>/#include <asm\/pgtable.h>/g' drivers/kernelsu/*.c || true
          sed -i 's/strncpy_from_user_nofault/strncpy_from_unsafe_user/g' drivers/kernelsu/*.c || true
          sed -i 's/copy_from_user_nofault/copy_from_user/g' drivers/kernelsu/*.c || true
          sed -i 's/copy_to_user_nofault/copy_to_user/g' drivers/kernelsu/*.c || true
          
          # 🛑 FSNOTIFY BYPASS (Bypasses the broken pkg_observer API on 5.4)
          echo "void ksu_pkg_observer_init(void) {}" > drivers/kernelsu/pkg_observer.c
          echo "void ksu_pkg_observer_exit(void) {}" >> drivers/kernelsu/pkg_observer.c
          
          # 🛑 SECCOMP CACHE AND BYPASS FIXES (Fixes filter_count, mode, and syscall definitions)
          sed -i '1i #include <asm/unistd.h>' drivers/kernelsu/seccomp_cache.c || true
          sed -i 's/SECCOMP_ARCH_NATIVE_NR/__NR_syscalls/g' drivers/kernelsu/seccomp_cache.c || true
          sed -i 's/.*seccomp.filter_count.*/\/\/ filter_count reset/g' drivers/kernelsu/app_profile.c || true
          sed -i 's/if (!!!current->seccomp.mode)/if (0)/g' drivers/kernelsu/app_profile.c || true
          sed -i 's/.*current->seccomp.mode =.*/\/\/ mode reset/g' drivers/kernelsu/app_profile.c || true
          sed -i 's/.*current->seccomp.filter =.*/\/\/ filter reset/g' drivers/kernelsu/app_profile.c || true
          
          # 🛑 SELINUX STRUCT AND TRANSITION FIXES (Silences the missing 5.4 structs and fixes policy pointers)
          sed -i 's/struct selinux_state/struct ksu_selinux_state/g' drivers/kernelsu/selinux/selinux.h || true
          sed -i 's/struct selinux_state/struct ksu_selinux_state/g' drivers/kernelsu/selinux/selinux.c || true
          sed -i 's/struct filename_trans_key key;/return true;\n#if 0/g' drivers/kernelsu/selinux/sepolicy.c || true
          sed -i 's/return ebitmap_set_bit(&trans->stypes, src->value - 1, 1) == 0;/#endif/g' drivers/kernelsu/selinux/sepolicy.c || true
          sed -i 's/struct selinux_policy \*policy = selinux_state.policy;//g' drivers/kernelsu/selinux/*.c || true
          sed -i 's/&policy->policydb/\&selinux_state.ss->policydb/g' drivers/kernelsu/selinux/*.c || true
          
          # Force Manual Hook bypass in KSU Makefiles
          sed -i '1i CONFIG_KSU_MANUAL_HOOK := y' drivers/kernelsu/Kbuild || true
          sed -i '1i CONFIG_KSU_MANUAL_HOOK := y' drivers/kernelsu/Makefile || true
          sed -i '/No hooks were defined/d' drivers/kernelsu/Kbuild || true

      - name: 🔑 Nuclear Export Symbols
        run: |
          nuclear_export() {
              local sym=$1
              local file=$(grep -lE "^static.* $sym|^struct.* $sym|^int.* $sym|^void.* $sym" security/selinux/*.c security/selinux/ss/*.c fs/*.c drivers/kernelsu/*.c 2>/dev/null | head -n 1)
              if [ -n "$file" ]; then
                  sed -i "s/^static //g" "$file"
                  sed -i "s/^static inline //g" "$file"
                  echo "EXPORT_SYMBOL_GPL($sym);" >> "$file"
              fi
          }
          nuclear_export "selinux_state"
          nuclear_export "selinux_blob_sizes"
          nuclear_export "hashtab_search"
          nuclear_export "hashtab_insert"
          nuclear_export "do_umount"

      - name: ⚙️ Kernel Config
        run: |
          export ARCH=arm64
          make ARCH=arm64 HOSTCC=gcc CC="clang --target=aarch64-linux-gnu" CROSS_COMPILE=aarch64-linux-gnu- gta9pwifi_eur_open_defconfig
          ./scripts/config --file .config --enable KSU
          ./scripts/config --file .config --enable KSU_NEXT
          ./scripts/config --file .config --enable KSU_MANUAL_HOOK
          ./scripts/config --file .config --disable LTO_CLANG
          ./scripts/config --file .config --disable TRIM_UNUSED_KSYMS
          yes "" | make ARCH=arm64 HOSTCC=gcc CC="clang --target=aarch64-linux-gnu" CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
   
      - name: 🔨 Compile
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          ccache -M 5G
          FLAGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 HOSTCC=gcc CC=clang -j$(nproc --all)"
          
          # 🛑 THE FAKE ID FIX: Force Samsung's exact Wi-Fi/Bluetooth string
          echo "-28972655-abX210XXS6CYB9" > .scmversion
          sed -i 's/echo "-dirty"/echo ""/g' scripts/setlocalversion || true
          
          K_INC="-I$(pwd)/security/selinux -I$(pwd)/security/selinux/include -I$(pwd)/drivers -I$(pwd)/drivers/usb/typec/P86801_tcpc -I$(pwd)/drivers/usb/typec/P86801_tcpc/inc"
          
          # Injected -DKSU_NEXT=1 to guarantee the manager recognizes the Next variant
          K_CFLAGS="-DCONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS=9 -DCONFIG_KSU=1 -DCONFIG_KSU_NEXT=1 -DKSU_NEXT=1 -DCONFIG_KSU_MANUAL_HOOK=1 -Wno-error=implicit-function-declaration -Wno-error=strict-prototypes -Wno-error=implicit-int -Wno-error=int-conversion -Wno-error=declaration-after-statement -Wno-error=unused-variable -Wno-error=unused-but-set-variable -Wno-error=unused-function -Wno-error=undef -Wno-error=visibility $K_INC"
          
          make $FLAGS Image KCFLAGS="$K_CFLAGS" || {
              rm -f fs/namespace.o security/selinux/*.o drivers/kernelsu/*.o
              make $FLAGS Image KCFLAGS="$K_CFLAGS"
          }


          
      - name: 📦 Package Output
        run: |
          if [ -f arch/arm64/boot/Image ]; then
            git clone https://github.com/osm0sis/AnyKernel3.git
            sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
            cp arch/arm64/boot/Image AnyKernel3/
            cd AnyKernel3 && zip -r9 ../TabA9Plus-KSU-Kernel.zip *
          else
            exit 1
          fi
    
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-Kernel
          path: TabA9Plus-KSU-Kernel.zip
