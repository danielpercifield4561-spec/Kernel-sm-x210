name: Build Tab A9+ Custom Kernel (KSU-Next)
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: 🛠️ Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev libelf-dev clang llvm lld gcc-aarch64-linux-gnu tar zip wget python3 cpio xz-utils dos2unix curl
          
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4

      - name: 📥 Integrate KernelSU-Next
        run: |
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -
     
      - name: 🩹 Apply Deep Source Code Fixes
        run: |
          # 🛑 FIX: TWA_RESUME (Solves the 'undeclared identifier' error in allowlist.c)
          sed -i 's/TWA_RESUME/true/g' drivers/kernelsu/*.c || true
          
          # 🛑 FIX: WALT TRACING (Solves './trace.h' file not found)
          sed -i 's|#define TRACE_INCLUDE_PATH .|#define TRACE_INCLUDE_PATH ../../kernel/sched/walt|g' kernel/sched/walt/trace.h || true
          
          # 🛑 FIX: ZSMALLOC PROTOTYPE (Solves 'function without a prototype' error)
          sed -i 's/void try_schedule_zs_compact()/void try_schedule_zs_compact(void)/g' mm/zsmalloc.c || true

          # 🛑 FIX: KERNEL 5.4 SECCOMP ERRORS
          sed -i 's/atomic_set(&current->seccomp.filter_count, 0);/\/\/ filter_count bypass/g' drivers/kernelsu/app_profile.c || true
          sed -i 's/current->seccomp.mode = 0;/\/\/ mode bypass/g' drivers/kernelsu/app_profile.c || true
          
          # 🛑 FIX: MODULE BYPASS (Forces hardware drivers to load)
          sed -i 's/return -ENOEXEC;/return 0;/g' kernel/module.c || true
          sed -i 's/same_magic = !strcmp(vermagic, modmagic);/same_magic = 1;/g' kernel/module.c || true

          # 🛑 SAMSUNG PROTOTYPE FIXES
          find techpack/display -name "*.c" -exec sed -i 's/static inline _/static inline u32 _/g' {} + || true
          sed -i 's/static int get_boot_mode()/static int get_boot_mode(void)/g' drivers/power/supply/wt_charger/wt_chg.c || true

      - name: ⚙️ Kernel Config & Hardware Force-In
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gta9pwifi_eur_open_defconfig
          
          # Force WiFi and Sensors to be Built-in
          ./scripts/config --file .config --enable CONFIG_WLAN
          ./scripts/config --file .config --set-val CONFIG_QCACLD_WLAN y
          ./scripts/config --file .config --enable CONFIG_INPUT_SENSORHUB
          ./scripts/config --file .config --enable CONFIG_SENSORS_SSC
          
          # KernelSU-Next & Identity
          ./scripts/config --file .config --enable CONFIG_KSU
          ./scripts/config --file .config --enable CONFIG_KSU_NEXT
          ./scripts/config --file .config --set-str CONFIG_LOCALVERSION "-everything-works"
          
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: 🔨 Compile
        run: |
          echo "-28972655-abX210XXS6CYB9" > .scmversion
          export LOCALVERSION=""
          
          FLAGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 HOSTCC=gcc CC=clang -j$(nproc --all)"
          
          # Skip minor style errors to ensure the build finishes
          K_CFLAGS="-DCONFIG_KSU=1 -DCONFIG_KSU_NEXT=1 -DKSU_NEXT=1 -Wno-error -Wno-strict-prototypes -Wno-implicit-function-declaration"
          
          make $FLAGS Image KCFLAGS="$K_CFLAGS"

      - name: 📦 Package Output
        run: |
          if [ -f arch/arm64/boot/Image ]; then
            git clone https://github.com/osm0sis/AnyKernel3.git
            cp arch/arm64/boot/Image AnyKernel3/
            cd AnyKernel3 && zip -r9 ../TabA9Plus-KSU-Final.zip *
          else
            echo "Build failed: Image not found" && exit 1
          fi

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-KSU-Final
          path: TabA9Plus-KSU-Final.zip
